version: '3.8'

services:
  # ── VPN Gateway (Gluetun mit WireGuard) ─────────────────────
  vpn:
    image: qmcgaw/gluetun
    container_name: vpn
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - .env
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER}
      - VPN_TYPE=${VPN_TYPE}
      # Aktiviert den Filter für die Gratis-Server:
      - FREE_ONLY=${FREE_ONLY}

      # Gewünschtes Land eintragen (z. B. Netherlands, United States, Japan)
      - SERVER_COUNTRIES=${SERVER_COUNTRIES}

      # Tragen Sie hier Ihre Werte aus der heruntergeladenen Datei ein:
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}

      # ERGÄNZUNG: Erlaubt dem Docker-Netzwerk (172.x.x.x) den Zugriff durch die VPN-Firewall
      - FIREWALL_OUTBOUND_SUBNETS=${FIREWALL_OUTBOUND_SUBNETS}
    ports:
      - "8011:8011"
    networks:
      stock-net:
        aliases:
          - yahoo-service
    restart: unless-stopped

  # ── Agent Service (:8010) ────────────────────────────────────
  agent-service:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: stock_agent
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      - YAHOO_SERVICE_URL=http://yahoo-service:8011
      - TWELVEDATA_SERVICE_URL=http://twelvedata-service:8012
      - DB_SERVICE_URL=http://db-service:8013
      - ML_SERVICE_URL=http://ml-service:8015
    depends_on:
      - vpn
      - twelvedata-service
      - ml-service
    networks:
      - stock-net

  # ── Yahoo Finance Service (Läuft ÜBER VPN) ───────────────────
  yahoo-service:
    build:
      context: ./yahoo-service
      dockerfile: Dockerfile
    container_name: stock_yahoo
    restart: unless-stopped
    network_mode: "container:vpn"
    depends_on:
      - vpn

  # ── Twelve Data Service (:8012) ──────────────────────────────
  twelvedata-service:
    build:
      context: ./twelvedata-service
      dockerfile: Dockerfile
    container_name: stock_twelvedata
    restart: unless-stopped
    ports:
      - "8012:8012"
    env_file:
      - ./twelvedata-service/.env
    networks:
      - stock-net

  # ── MySQL 9.7 Datenbank ────────────────────────────────────────
  mysql-db:
    image: mysql:9.7
    platform: linux/arm64
    container_name: stock_data_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=stock_data
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
    - "3306:3306"
    networks:
      - stock-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── DB Access Service (:8013) ────────────────────────────────
  db-service:
    build:
      context: ./stock-data-db-access
      dockerfile: Dockerfile
    container_name: stock_db_access
    restart: unless-stopped
    ports:
      - "8013:8013"
    environment:
      - DB_HOST=mysql-db
      - DB_PORT=3306
      - DB_NAME=stock_data
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - stock-net

  # ── History Fetcher (:8014) ──────────────────────────────────
  history-fetcher:
    build:
      context: ./history-fetcher
      dockerfile: Dockerfile
    container_name: stock_history_fetcher
    restart: unless-stopped
    ports:
      - "8014:8014"
    environment:
      - YAHOO_SERVICE_URL=http://yahoo-service:8011
      - TWELVEDATA_SERVICE_URL=http://twelvedata-service:8012
      - DB_SERVICE_URL=http://db-service:8013
      # Erstbefüllung beim ersten Start automatisch ausführen (true/false)
      - AUTO_INITIAL_RUN=true
      # Täglicher Update-Lauf um 20:00 Uhr (nach Börsenschluss)
      - DAILY_UPDATE_HOUR=20
      - DAILY_UPDATE_MINUTE=0
      # 5 Jahre Tagesdaten, 12 Monate Stundendaten
      - INITIAL_DAILY_DAYS=1825
      - INITIAL_HOURLY_HOURS=8760
    depends_on:
      - db-service
      - vpn
      - twelvedata-service
    networks:
      - stock-net

  # ── ML Service (:8015) ───────────────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: stock_ml_service
    restart: unless-stopped
    ports:
      - "8015:8015"
    environment:
      - DB_SERVICE_URL=http://db-service:8013
      # Forecast-Horizont in Tagen (Umkehr in den nächsten N Tagen)
      - FORECAST_HORIZON=5
      # Mindest-Preisänderung % für eine Umkehr
      - REVERSAL_THRESHOLD_PCT=3.0
      # Wöchentliches Retraining: Sonntag 02:00 Uhr
      - RETRAIN_WEEKDAY=6
      - RETRAIN_HOUR=2
      - RETRAIN_MINUTE=0
    volumes:
      # Modell bleibt nach Container-Neustart erhalten
      - ml_models:/app/models
    depends_on:
      - db-service
    networks:
      - stock-net

  # ── Angular Client (:4200) ───────────────────────────────────
  angular-client:
    build:
      context: ./angular-client
      dockerfile: Dockerfile
    container_name: stock_client
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - agent-service
    networks:
      - stock-net

networks:
  stock-net:
    driver: bridge

volumes:
  mysql_data:
  ml_models:
